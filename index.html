<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Import React e Babel -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "./chatbotLogic.js": "./chatbotLogic.js"
        }
      }
    </script>

    <!-- Babel standalone para compilar TSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script>
      // Configura o es-module-shims para transformar TSX com Babel
      esmsInitOptions = {
        async fetch(url) {
          if (/\.tsx?$/.test(url)) {
            const res = await fetch(url);
            const src = await res.text();
            const { code } = Babel.transform(src, {
              presets: ["react", "typescript"], // 👈 agora entende TS + JSX
            });
            return new Response(code, {
              headers: { "Content-Type": "application/javascript" },
            });
          }
          return fetch(url);
        },
      };
    </script>

    <!-- Importa o ponto de entrada React -->
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
