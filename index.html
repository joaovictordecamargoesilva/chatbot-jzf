<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Contábil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. Load Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    
    <!-- 2. Configure es-module-shims to use Babel for .tsx files -->
    <script>
      window.esmsInitOptions = {
        shimMode: true,
        async fetch(url, options) {
          const res = await fetch(url, options);
          if (!res.ok) return res;
          
          if (url.pathname.endsWith('.tsx') || (url.pathname.endsWith('.js') && !url.href.includes('esm.sh'))) {
            const source = await res.text();
            const { code } = Babel.transform(source, {
              presets: ['react', 'typescript'],
              filename: url.href
            });
            return new Response(new Blob([code], { type: 'application/javascript' }));
          }
          
          return res;
        }
      }
    </script>
    
    <!-- 3. ES Module Shims: Polyfill for importmaps from a RELIABLE CDN -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    
    <!-- 4. IMPORT MAP 100% LIMPO - APENAS DEPENDÊNCIAS DE FRONTEND -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "./chatbotLogic.js": "./chatbotLogic.js"
      }
    }
    </script>

    <style>
      .whatsapp-bg {
        background-color: #e5ddd5;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      }
    </style>
</head>
  <body class="bg-gray-200">
    <div id="root"></div>
    
    <!-- 5. Load the main TSX module. The shim will intercept, transpile, and execute this. -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
