<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Contábil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 1. Load Babel for in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
    
    <!-- 2. Configure es-module-shims to use Babel for .tsx files -->
    <script>
      window.esmsInitOptions = {
        shimMode: true, // Enable shimming for browsers that support modules but not import maps
        async fetch(url, options) {
          const res = await fetch(url, options);
          if (!res.ok) return res; // Pass through errors
          
          // Check if the file is a TSX file that needs transpilation
          if (url.pathname.endsWith('.tsx')) {
            const source = await res.text();
            // Transpile using Babel
            const { code } = Babel.transform(source, {
              presets: ['react', 'typescript'],
              filename: url.href // Important for sourcemaps and error messages
            });
            // Return a new Response object with the transpiled JS
            return new Response(new Blob([code], { type: 'application/javascript' }));
          }
          
          // For all other files, return the original response
          return res;
        }
      }
    </script>
    
    <!-- 3. ES Module Shims: Polyfill for importmaps, now with Babel hook configured -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    
    <!-- 4. Cleaned up Import Map -->
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
    "react/": "https://aistudiocdn.com/react@^19.1.1/",
    "express": "https://aistudiocdn.com/express@^5.1.0",
    "path": "https://aistudiocdn.com/path@^0.12.7",
    "url": "https://aistudiocdn.com/url@^0.11.4",
    "@wppconnect-team/wppconnect": "https://aistudiocdn.com/@wppconnect-team/wppconnect@^1.37.5",
    "node-fetch": "https://aistudiocdn.com/node-fetch@^3.3.2",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0"
  }
}
</script>

    <style>
      .whatsapp-bg {
        background-color: #e5ddd5;
        background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-200">
    <div id="root"></div>
    
    <!-- 5. Load the main TSX module. The shim will intercept, transpile, and execute this. -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
